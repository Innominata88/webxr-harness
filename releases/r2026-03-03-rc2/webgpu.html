<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>WebGPU Harness</title>
  <style>
html, body { height: 100%; margin: 0; background: #111; color: #ddd; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; }
header { position: fixed; top: 0; left: 0; right: 0; padding: 10px 12px; background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); display:flex; gap:12px; align-items:center; z-index: 10; }
#status { opacity: 0.9; font-size: 14px; }
main { height: 100%; display:flex; }
canvas { width: 100%; height: 100%; display:block; }
button { padding: 8px 10px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.08); color: #fff; }
button:disabled { opacity: 0.4; }
a { color: #9ad; }
</style>
</head>
<body>
<header>
  <button id="xr-button" disabled>Checking XR…</button>
  <span id="status">Loading…</span>
  <span style="margin-left:auto; opacity:0.8">WebGPU</span>
</header>
<main><canvas></canvas></main>
<script type="module">
  const params = new URLSearchParams(location.search);
  const rev = params.get("appRev") || params.get("harnessCommit");
  const statusEl = document.getElementById("status");
  function setStatus(msg) {
    if (statusEl) statusEl.textContent = msg;
  }
  const src = new URL("./src/app-webgpu.js", location.href);
  if (rev) src.searchParams.set("v", rev);
  const srcFallback = new URL("./src/app-webgpu.js", location.href);
  window.addEventListener("error", (e) => {
    setStatus(`Boot error: ${e?.message || "unknown"}`);
  });
  window.addEventListener("unhandledrejection", (e) => {
    const reason = e?.reason;
    setStatus(`Boot rejection: ${reason?.message || String(reason || "unknown")}`);
  });
  (async () => {
    try {
      await import(src.href);
      return;
    } catch (err) {
      console.error("Failed to import WebGPU harness module:", err);
      if (!rev) {
        setStatus(`Module load failed: ${err?.message || String(err)}`);
        return;
      }
      try {
        await import(srcFallback.href);
        setStatus("Loaded module without cache-buster fallback.");
        return;
      } catch (fallbackErr) {
        console.error("Fallback import failed:", fallbackErr);
        setStatus(`Module load failed: ${fallbackErr?.message || String(fallbackErr)}`);
      }
    }
  })();
  setTimeout(() => {
    if (!statusEl) return;
    const text = statusEl.textContent || "";
    if (text === "Loading…" || text === "Loading...") {
      setStatus("Still loading module… (check console for boot errors)");
    }
  }, 8000);
</script>
</body>
</html>
